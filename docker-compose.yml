services:
  # --- CLUSTER CASSANDRA ---
  cassandra1:
    image: cassandra:latest
    container_name: cassandra1
    environment:
      - CASSANDRA_CLUSTER_NAME=DataPlatform
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
      - CASSANDRA_NUM_TOKENS=16
    mem_limit: 1gb
    memswap_limit: 1gb
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 30s
      timeout: 20s
      retries: 15
      start_period: 120s
    networks: [data-platform]

  cassandra2:
    image: cassandra:latest
    container_name: cassandra2
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - CASSANDRA_CLUSTER_NAME=DataPlatform
      - CASSANDRA_SEEDS=cassandra1
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
      - CASSANDRA_NUM_TOKENS=16
    mem_limit: 1gb
    memswap_limit: 1gb
    networks: [data-platform]

  cassandra3:
    image: cassandra:latest
    container_name: cassandra3
    depends_on:
      cassandra1:
        condition: service_healthy
    environment:
      - CASSANDRA_CLUSTER_NAME=DataPlatform
      - CASSANDRA_SEEDS=cassandra1
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=64M
      - CASSANDRA_NUM_TOKENS=16
    mem_limit: 1gb
    memswap_limit: 1gb
    networks: [data-platform]

  # --- CLUSTER KAFKA ---
  ed-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: ed-zookeeper
    environment: {ZOOKEEPER_CLIENT_PORT: 2181}
    mem_limit: 180mb
    networks: [data-platform]

  ed-kafka-1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ed-kafka-1
    depends_on: [ed-zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'ed-zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://ed-kafka-1:29092,PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_HEAP_OPTS: "-Xms200M -Xmx200M"
    mem_limit: 380mb
    networks: [data-platform]

  ed-kafka-2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ed-kafka-2
    depends_on: [ed-zookeeper]
    ports: ["9093:9093"]
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: 'ed-zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://ed-kafka-2:29093,PLAINTEXT://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_HEAP_OPTS: "-Xms200M -Xmx200M"
    mem_limit: 380mb
    networks: [data-platform]

  ed-kafka-3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ed-kafka-3
    depends_on: [ed-zookeeper]
    ports: ["9094:9094"]
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: 'ed-zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://ed-kafka-3:29094,PLAINTEXT://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_HEAP_OPTS: "-Xms200M -Xmx200M"
    mem_limit: 380mb
    networks: [data-platform]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on: [ed-kafka-1]
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ed-kafka-1:29092,ed-kafka-2:29093,ed-kafka-3:29094
    mem_limit: 250mb
    networks: [data-platform]

  # --- AIRFLOW ---
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    environment: [POSTGRES_USER=airflow, POSTGRES_PASSWORD=airflow, POSTGRES_DB=airflow]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    mem_limit: 200mb
    networks: [data-platform]

  airflow-init:
    image: apache/airflow:2.6.0-python3.10
    container_name: airflow-init
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    # Suppression du pip install ici pour sauver la RAM
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    mem_limit: 600mb
    networks: [data-platform]

  airflow-webserver:
    image: apache/airflow:2.6.0-python3.10
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123
      - GUNICORN_CMD_ARGS="--workers 2"
    ports: ["8081:8080"]
    command: webserver
    mem_limit: 512mb
    restart: on-failure
    networks: [data-platform]

  airflow-scheduler:
    image: apache/airflow:2.6.0-python3.10
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123
    command: scheduler
    mem_limit: 512mb
    restart: on-failure
    networks: [data-platform]

  # --- ANALYTICS ---
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    volumes:
      - ./airflow/scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
    ports: ["8082:8080"]
    mem_limit: 450mb
    networks: [data-platform]

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    volumes:
      - ./airflow:/home/jovyan/airflow
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    ports: ["8888:8888"]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    mem_limit: 900mb
    networks: [data-platform]

networks:
  data-platform:
    driver: bridge

volumes:
  postgres_data: